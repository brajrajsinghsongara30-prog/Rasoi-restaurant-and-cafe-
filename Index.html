<!DOCTYPE html>

    <title>Rasoi Restaurant & Cafe - Nalkheda</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-dark: #0f0f0f; --bg-card: rgba(255,255,255,0.05); --bg-card-hover: rgba(255,255,255,0.08);
            --bg-glass: rgba(30,30,30,0.6); --primary: #ff8c00; --primary-light: #ffa733;
            --text-primary: #ffffff; --text-secondary: #a0a0a0; --border: rgba(255,255,255,0.1);
            --success: #00c853; --danger: #ff4757; --info: #2196F3;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); overflow-x: hidden; min-height: 100vh; padding-bottom: 90px; }
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.4; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, #ff8c00 0%, transparent 70%); top: -100px; right: -100px; }
        .orb-2 { width: 250px; height: 250px; background: radial-gradient(circle, #ff6b35 0%, transparent 70%); bottom: 100px; left: -100px; animation-delay: 2s; }
        .orb-3 { width: 200px; height: 200px; background: radial-gradient(circle, #ff4757 0%, transparent 70%); top: 50%; right: -50px; animation-delay: 4s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-20px,20px) scale(1.1)} 66%{transform:translate(20px,-10px) scale(0.9)} }
        .app-container { max-width: 480px; margin: 0 auto; padding: 20px; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px; }
        .menu-btn { width: 44px; height: 44px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--text-primary); font-size: 18px; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s; }
        .menu-btn:active { transform: scale(0.95); }
        .header-center { text-align: center; flex: 1; margin: 0 12px; }
        .restaurant-name-header { font-size: 14px; font-weight: 700; color: var(--primary); letter-spacing: 1px; text-transform: uppercase; }
        .header-location { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .profile-btn { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; border: 2px solid var(--primary); cursor: pointer; position: relative; }
        .profile-btn img { width: 100%; height: 100%; object-fit: cover; }
        .online-status { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: var(--success); border: 2px solid var(--bg-dark); border-radius: 50%; }
        .greeting { margin-bottom: 20px; }
        .greeting h2 { font-size: 14px; color: var(--text-secondary); font-weight: 400; margin-bottom: 4px; }
        .greeting h1 { font-size: 32px; font-weight: 700; line-height: 1.2; }
        .greeting .highlight { color: var(--primary); }
        .status-bar { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
        .status-bar::-webkit-scrollbar { display: none; }
        .status-pill { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap; backdrop-filter: blur(10px); }
        .status-pill.open { border-color: rgba(0,200,83,0.3); color: var(--success); }
        .status-pill.delivery { border-color: rgba(255,140,0,0.3); color: var(--primary); }
        .pulse-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(0,200,83,0.7)} 70%{box-shadow:0 0 0 8px rgba(0,200,83,0)} 100%{box-shadow:0 0 0 0 rgba(0,200,83,0)} }
        .search-container { position: relative; margin-bottom: 24px; }
        .search-bar { width: 100%; padding: 16px 20px 16px 48px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; color: var(--text-primary); font-size: 14px; outline: none; backdrop-filter: blur(10px); transition: all 0.3s; }
        .search-bar:focus { border-color: var(--primary); background: var(--bg-glass); box-shadow: 0 0 20px rgba(255,140,0,0.1); }
        .search-bar::placeholder { color: var(--text-secondary); }

        .promo-btn:active { transform: scale(0.95); }

        .food-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--primary-light)); transform: scaleX(0); transition: transform 0.3s; }
        .food-card:hover::before, .food-card:active::before { transform: scaleX(1); }

        .food-card:hover { background: var(--bg-card-hover); }
